<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魂斗罗 - Contra Style Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #444;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 32px;
            text-align: center;
            display: none;
            text-shadow: 3px 3px 0 #000;
            z-index: 20;
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 30;
        }
        #startScreen h1 {
            color: #ff6600;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 #000;
        }
        #startScreen p {
            margin: 10px 0;
            font-size: 16px;
        }
        #startBtn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #ff6600;
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        #startBtn:hover {
            background: #ff8800;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>SCORE: <span id="score">0</span></div>
            <div>LIVES: <span id="lives">3</span></div>
            <div>WEAPON: <span id="weapon">NORMAL</span></div>
        </div>
        <div id="gameOver">
            <div>GAME OVER</div>
            <div style="font-size: 16px; color: #fff; margin-top: 20px;">Press R to Restart</div>
        </div>
        <div id="startScreen">
            <h1>魂斗罗</h1>
            <p>WASD / 方向键 - 移动</p>
            <p>J / Z - 射击</p>
            <p>K / X - 跳跃</p>
            <button id="startBtn">START GAME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const weaponEl = document.getElementById('weapon');
        const gameOverEl = document.getElementById('gameOver');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');

        // Game state
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let frameCount = 0;

        // Input handling
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'r' || e.key === 'R') {
                if (!gameRunning) restartGame();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Player
        const player = {
            x: 100,
            y: 400,
            width: 30,
            height: 40,
            vx: 0,
            vy: 0,
            speed: 5,
            jumpPower: 15,
            grounded: false,
            facing: 1,
            weapon: 'normal',
            shootCooldown: 0,
            invincible: 0,
            animFrame: 0
        };

        // Game objects
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let powerups = [];
        let platforms = [];

        // Ground level
        const GROUND_Y = 520;

        // Initialize platforms
        function initPlatforms() {
            platforms = [
                { x: 0, y: GROUND_Y, width: 2000, height: 80 },
                { x: 300, y: 420, width: 150, height: 20 },
                { x: 550, y: 350, width: 150, height: 20 },
                { x: 800, y: 280, width: 150, height: 20 },
                { x: 200, y: 300, width: 120, height: 20 },
                { x: 450, y: 220, width: 120, height: 20 }
            ];
        }

        // Create bullet
        function createBullet(x, y, vx, vy, isEnemy = false) {
            return { x, y, vx, vy, width: 8, height: 4, isEnemy };
        }

        // Create enemy
        function createEnemy(x, y, type = 'soldier') {
            return {
                x, y,
                width: 30,
                height: 40,
                vx: type === 'soldier' ? -2 : 0,
                vy: 0,
                type,
                hp: type === 'tank' ? 5 : 1,
                shootCooldown: 0,
                animFrame: 0
            };
        }

        // Create particle
        function createParticle(x, y, color) {
            return {
                x, y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 30,
                color,
                size: Math.random() * 4 + 2
            };
        }

        // Create powerup
        function createPowerup(x, y) {
            const types = ['spread', 'rapid', 'laser'];
            return {
                x, y,
                width: 25,
                height: 25,
                type: types[Math.floor(Math.random() * types.length)],
                bobOffset: Math.random() * Math.PI * 2
            };
        }

        // Explosion effect
        function createExplosion(x, y, color = '#ff6600') {
            for (let i = 0; i < 15; i++) {
                particles.push(createParticle(x, y, color));
            }
        }

        // Update player
        function updatePlayer() {
            // Movement
            if (keys['a'] || keys['arrowleft']) {
                player.vx = -player.speed;
                player.facing = -1;
            } else if (keys['d'] || keys['arrowright']) {
                player.vx = player.speed;
                player.facing = 1;
            } else {
                player.vx *= 0.8;
            }

            // Jump
            if ((keys['k'] || keys['x']) && player.grounded) {
                player.vy = -player.jumpPower;
                player.grounded = false;
            }

            // Gravity
            player.vy += 0.8;

            // Apply velocity
            player.x += player.vx;
            player.y += player.vy;

            // Platform collision
            player.grounded = false;
            for (let platform of platforms) {
                if (player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width &&
                    player.y + player.height > platform.y &&
                    player.y + player.height < platform.y + platform.height + 20 &&
                    player.vy >= 0) {
                    player.y = platform.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            }

            // Screen bounds
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            if (player.y > canvas.height) {
                playerDies();
            }

            // Shooting
            if (player.shootCooldown > 0) player.shootCooldown--;
            if ((keys['j'] || keys['z']) && player.shootCooldown <= 0) {
                shoot();
            }

            // Invincibility
            if (player.invincible > 0) player.invincible--;

            // Animation
            player.animFrame++;
        }

        // Player shoot
        function shoot() {
            const bulletSpeed = 12;
            const bx = player.x + (player.facing > 0 ? player.width : 0);
            const by = player.y + player.height / 2;

            if (player.weapon === 'normal') {
                bullets.push(createBullet(bx, by, bulletSpeed * player.facing, 0));
                player.shootCooldown = 10;
            } else if (player.weapon === 'spread') {
                bullets.push(createBullet(bx, by, bulletSpeed * player.facing, 0));
                bullets.push(createBullet(bx, by, bulletSpeed * player.facing, -3));
                bullets.push(createBullet(bx, by, bulletSpeed * player.facing, 3));
                player.shootCooldown = 12;
            } else if (player.weapon === 'rapid') {
                bullets.push(createBullet(bx, by, bulletSpeed * player.facing, 0));
                player.shootCooldown = 5;
            } else if (player.weapon === 'laser') {
                bullets.push(createBullet(bx, by, bulletSpeed * 1.5 * player.facing, 0));
                player.shootCooldown = 20;
            }
        }

        // Update bullets
        function updateBullets() {
            // Player bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Check enemy hits
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (b.x < e.x + e.width && b.x + b.width > e.x &&
                        b.y < e.y + e.height && b.y + b.height > e.y) {
                        e.hp--;
                        bullets.splice(i, 1);
                        if (e.hp <= 0) {
                            createExplosion(e.x + e.width/2, e.y + e.height/2);
                            score += e.type === 'tank' ? 500 : 100;
                            
                            // Chance to drop powerup
                            if (Math.random() < 0.15) {
                                powerups.push(createPowerup(e.x, e.y));
                            }
                            
                            enemies.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            // Enemy bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx;
                b.y += b.vy;

                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    enemyBullets.splice(i, 1);
                    continue;
                }

                // Check player hit
                if (player.invincible <= 0 &&
                    b.x < player.x + player.width && b.x + b.width > player.x &&
                    b.y < player.y + player.height && b.y + b.height > player.y) {
                    playerDies();
                    enemyBullets.splice(i, 1);
                }
            }
        }

        // Update enemies
        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                
                if (e.type === 'soldier') {
                    e.x += e.vx;
                    e.animFrame++;
                    
                    // Turn around at edges
                    if (e.x < 50 || e.x > canvas.width - 50) {
                        e.vx *= -1;
                    }
                    
                    // Shoot at player
                    if (e.shootCooldown > 0) e.shootCooldown--;
                    if (e.shootCooldown <= 0 && Math.abs(e.x - player.x) < 300) {
                        const dx = player.x > e.x ? 1 : -1;
                        enemyBullets.push(createBullet(
                            e.x + e.width/2, e.y + e.height/2,
                            dx * 5, 0, true
                        ));
                        e.shootCooldown = 120;
                    }
                } else if (e.type === 'turret') {
                    if (e.shootCooldown > 0) e.shootCooldown--;
                    if (e.shootCooldown <= 0) {
                        const angle = Math.atan2(player.y - e.y, player.x - e.x);
                        enemyBullets.push(createBullet(
                            e.x + e.width/2, e.y + e.height/2,
                            Math.cos(angle) * 4, Math.sin(angle) * 4, true
                        ));
                        e.shootCooldown = 90;
                    }
                }

                // Remove off-screen enemies
                if (e.x < -100 || e.x > canvas.width + 100) {
                    enemies.splice(i, 1);
                }
            }

            // Spawn enemies
            if (frameCount % 120 === 0) {
                const type = Math.random() < 0.8 ? 'soldier' : 'turret';
                const x = Math.random() < 0.5 ? canvas.width + 50 : -50;
                const y = type === 'turret' ? 200 : GROUND_Y - 40;
                enemies.push(createEnemy(x, y, type));
            }
        }

        // Update particles
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        // Update powerups
        function updatePowerups() {
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.bobOffset += 0.1;
                
                // Check collection
                if (player.x < p.x + p.width && player.x + player.width > p.x &&
                    player.y < p.y + p.height && player.y + player.height > p.y) {
                    player.weapon = p.type;
                    weaponEl.textContent = p.type.toUpperCase();
                    score += 50;
                    powerups.splice(i, 1);
                }
            }
        }

        // Player dies
        function playerDies() {
            if (player.invincible > 0) return;
            
            lives--;
            livesEl.textContent = lives;
            createExplosion(player.x + player.width/2, player.y + player.height/2, '#00ff00');
            
            if (lives <= 0) {
                gameOver();
            } else {
                player.x = 100;
                player.y = 400;
                player.vx = 0;
                player.vy = 0;
                player.invincible = 120;
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            gameOverEl.style.display = 'block';
        }

        // Restart game
        function restartGame() {
            score = 0;
            lives = 3;
            player.x = 100;
            player.y = 400;
            player.vx = 0;
            player.vy = 0;
            player.weapon = 'normal';
            player.invincible = 0;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            particles = [];
            powerups = [];
            initPlatforms();
            gameOverEl.style.display = 'none';
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            weaponEl.textContent = 'NORMAL';
            gameRunning = true;
        }

        // Draw functions
        function drawPlayer() {
            if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) return;
            
            const x = player.x;
            const y = player.y;
            const w = player.width;
            const h = player.height;
            const facing = player.facing;

            // Body (green military uniform)
            ctx.fillStyle = '#228B22';
            ctx.fillRect(x + 5, y + 10, w - 10, h - 10);
            
            // Head
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(x + 8, y, 14, 12);
            
            // Bandana
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x + 6, y + 2, 18, 4);
            ctx.fillRect(x + (facing > 0 ? 20 : 2), y + 4, 6, 8);
            
            // Eyes
            ctx.fillStyle = '#000';
            if (facing > 0) {
                ctx.fillRect(x + 16, y + 6, 3, 3);
            } else {
                ctx.fillRect(x + 11, y + 6, 3, 3);
            }
            
            // Arms holding gun
            ctx.fillStyle = '#FFDBAC';
            if (facing > 0) {
                ctx.fillRect(x + 20, y + 15, 12, 6);
            } else {
                ctx.fillRect(x - 2, y + 15, 12, 6);
            }
            
            // Gun
            ctx.fillStyle = '#444';
            if (facing > 0) {
                ctx.fillRect(x + 28, y + 14, 16, 5);
                ctx.fillRect(x + 40, y + 12, 4, 9);
            } else {
                ctx.fillRect(x - 14, y + 14, 16, 5);
                ctx.fillRect(x - 14, y + 12, 4, 9);
            }
            
            // Legs (running animation)
            ctx.fillStyle = '#1a6b1a';
            const legOffset = player.grounded ? Math.sin(player.animFrame * 0.3) * 3 : 0;
            ctx.fillRect(x + 6, y + h - 10 + legOffset, 8, 12);
            ctx.fillRect(x + 16, y + h - 10 - legOffset, 8, 12);
            
            // Boots
            ctx.fillStyle = '#333';
            ctx.fillRect(x + 5, y + h - 2, 10, 4);
            ctx.fillRect(x + 17, y + h - 2, 10, 4);
        }

        function drawEnemy(e) {
            if (e.type === 'soldier') {
                // Enemy soldier (blue uniform)
                ctx.fillStyle = '#4169E1';
                ctx.fillRect(e.x + 5, e.y + 10, e.width - 10, e.height - 10);
                
                // Head
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(e.x + 8, e.y, 14, 12);
                
                // Helmet
                ctx.fillStyle = '#2F4F4F';
                ctx.fillRect(e.x + 6, e.y - 2, 18, 6);
                
                // Eyes
                ctx.fillStyle = '#fff';
                const facing = e.vx > 0 ? 1 : -1;
                if (facing > 0) {
                    ctx.fillRect(e.x + 16, e.y + 5, 4, 3);
                } else {
                    ctx.fillRect(e.x + 10, e.y + 5, 4, 3);
                }
                
                // Gun
                ctx.fillStyle = '#333';
                if (facing > 0) {
                    ctx.fillRect(e.x + 25, e.y + 18, 12, 4);
                } else {
                    ctx.fillRect(e.x - 7, e.y + 18, 12, 4);
                }
                
                // Legs
                ctx.fillStyle = '#1a3a6e';
                const legOffset = Math.sin(e.animFrame * 0.2) * 2;
                ctx.fillRect(e.x + 6, e.y + e.height - 10 + legOffset, 7, 12);
                ctx.fillRect(e.x + 17, e.y + e.height - 10 - legOffset, 7, 12);
            } else if (e.type === 'turret') {
                // Turret base
                ctx.fillStyle = '#444';
                ctx.fillRect(e.x, e.y + 20, e.width, 20);
                
                // Turret head
                ctx.fillStyle = '#666';
                ctx.beginPath();
                ctx.arc(e.x + e.width/2, e.y + 20, 15, Math.PI, 0);
                ctx.fill();
                
                // Barrel
                ctx.fillStyle = '#333';
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                const bx = e.x + e.width/2 + Math.cos(angle) * 15;
                const by = e.y + 20 + Math.sin(angle) * 15;
                ctx.beginPath();
                ctx.moveTo(e.x + e.width/2, e.y + 20);
                ctx.lineTo(bx + Math.cos(angle) * 15, by + Math.sin(angle) * 15);
                ctx.lineWidth = 6;
                ctx.strokeStyle = '#222';
                ctx.stroke();
                ctx.lineWidth = 1;
                
                // Red eye
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(e.x + e.width/2, e.y + 15, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawBullet(b) {
            if (b.isEnemy) {
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(b.x, b.y, b.width, b.height);
            } else {
                if (player.weapon === 'laser') {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(b.x, b.y - 1, b.width * 2, 6);
                    ctx.fillStyle = '#ccffcc';
                    ctx.fillRect(b.x, b.y, b.width * 2, 2);
                } else if (player.weapon === 'spread') {
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath();
                    ctx.arc(b.x + 4, b.y + 2, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else if (player.weapon === 'rapid') {
                    ctx.fillStyle = '#ffaa00';
                    ctx.fillRect(b.x, b.y, b.width + 4, 3);
                } else {
                    ctx.fillStyle = '#ffff00';
                    ctx.fillRect(b.x, b.y, b.width, b.height);
                }
            }
        }

        function drawPowerup(p) {
            const bobY = Math.sin(p.bobOffset) * 3;
            const colors = {
                spread: '#ff00ff',
                rapid: '#00ffff',
                laser: '#00ff00'
            };
            
            // Glow
            ctx.fillStyle = colors[p.type] + '44';
            ctx.beginPath();
            ctx.arc(p.x + p.width/2, p.y + p.height/2 + bobY, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // Box
            ctx.fillStyle = colors[p.type];
            ctx.fillRect(p.x, p.y + bobY, p.width, p.height);
            
            // Letter
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(p.type[0].toUpperCase(), p.x + p.width/2, p.y + p.height/2 + 5 + bobY);
        }

        function drawPlatforms() {
            for (let p of platforms) {
                // Grass top
                ctx.fillStyle = '#228B22';
                ctx.fillRect(p.x, p.y, p.width, 6);
                
                // Dirt body
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(p.x, p.y + 6, p.width, p.height - 6);
                
                // Detail
                ctx.fillStyle = '#654321';
                for (let i = 0; i < p.width; i += 30) {
                    ctx.fillRect(p.x + i, p.y + 10, 4, p.height - 14);
                }
            }
        }

        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#001122');
            gradient.addColorStop(0.5, '#003344');
            gradient.addColorStop(1, '#004455');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Distant mountains
            ctx.fillStyle = '#002233';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let x = 0; x <= canvas.width; x += 50) {
                ctx.lineTo(x, canvas.height - 100 - Math.sin(x * 0.01) * 50);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();
            
            // Jungle silhouette
            ctx.fillStyle = '#001a1a';
            for (let x = 0; x < canvas.width; x += 80) {
                const h = 80 + Math.sin(x * 0.02) * 30;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - 80);
                ctx.lineTo(x + 20, canvas.height - 80 - h);
                ctx.lineTo(x + 40, canvas.height - 80);
                ctx.fill();
            }
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.globalAlpha = 1;
            }
        }

        // Main game loop
        function gameLoop() {
            if (!gameRunning) {
                requestAnimationFrame(gameLoop);
                return;
            }

            frameCount++;

            // Update
            updatePlayer();
            updateBullets();
            updateEnemies();
            updateParticles();
            updatePowerups();

            // Update UI
            scoreEl.textContent = score;

            // Draw
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawPlatforms();
            
            for (let p of powerups) drawPowerup(p);
            for (let e of enemies) drawEnemy(e);
            drawPlayer();
            for (let b of bullets) drawBullet(b);
            for (let b of enemyBullets) drawBullet(b);
            drawParticles();

            requestAnimationFrame(gameLoop);
        }

        // Start button
        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            restartGame();
        });

        // Initialize
        initPlatforms();
        gameLoop();
    </script>
</body>
</html>
