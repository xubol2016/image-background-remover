name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: cfat_B0UoOS5Z8a0o9i36MZi0OCqUKbnLG6BHHMlxsTXOecc82620
          accountId: 13ee7e61b8d663d105efa3b87bf39ea3
          projectName: image-background-remover
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
