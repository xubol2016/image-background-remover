<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸 - 无限波次</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #98D8C8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #2E7D32; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 10px; }
        #gameInfo { display: flex; gap: 20px; margin-bottom: 10px; font-size: 16px; font-weight: bold; flex-wrap: wrap; justify-content: center; }
        #sunCount { color: #FF6F00; }
        #score { color: #1565C0; }
        #wave { color: #C62828; }
        #gameTime { color: #6A1B9A; }
        #speedControl { color: #00695C; }
        #difficulty { color: #D84315; }
        #plantSelector {
            display: flex; gap: 10px; margin-bottom: 10px; padding: 10px;
            background: rgba(255,255,255,0.8); border-radius: 10px; flex-wrap: wrap; justify-content: center;
        }
        .plantCard {
            width: 75px; height: 95px; border: 3px solid #666; border-radius: 8px;
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #f0f0f0;
            transition: all 0.2s; position: relative;
        }
        .plantCard:hover { transform: scale(1.05); border-color: #4CAF50; }
        .plantCard.selected { border-color: #FF5722; background: #FFF3E0; }
        .plantCard.disabled { opacity: 0.5; cursor: not-allowed; }
        .cooldownOverlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.5); transition: height 0.1s;
        }
        .plantIcon { font-size: 35px; }
        .plantCost { font-size: 12px; color: #FF6F00; font-weight: bold; }
        #gameCanvas {
            border: 4px solid #4CAF50; border-radius: 10px;
            background: #8BC34A; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #controls { margin-top: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; }
        #startBtn { background: #4CAF50; color: white; }
        #startBtn:hover { background: #45a049; }
        #pauseBtn { background: #FF9800; color: white; }
        .speedBtn { background: #2196F3; color: white; }
        .speedBtn.active { background: #1565C0; }
        #gameOver {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.9);
            color: white; padding: 40px; border-radius: 20px;
            text-align: center; z-index: 1000;
        }
        #gameOver h2 { font-size: 36px; margin-bottom: 20px; }
        #finalScore { font-size: 24px; color: #FFD700; margin-bottom: 20px; }
        #restartBtn { background: #4CAF50; color: white; font-size: 20px; padding: 15px 30px; }
        #waveInfo {
            position: fixed; top: 20px; right: 20px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 15px; border-radius: 10px; font-size: 14px;
            max-width: 250px; display: none;
        }
        #waveInfo h3 { color: #FFD700; margin-bottom: 10px; }
        #waveInfo p { margin: 5px 0; }
    </style>
</head>
<body>
    <h1>🌻 植物大战僵尸 - 无限波次 🧟</h1>
    <div id="gameInfo">
        <div id="sunCount">☀️ 阳光: 150</div>
        <div id="score">🏆 分数: 0</div>
        <div id="wave">🌊 波次: 0</div>
        <div id="difficulty">💀 难度: 1.0x</div>
        <div id="gameTime">⏱️ 时间: 0s</div>
        <div id="speedControl">⚡ 倍速: 1x</div>
    </div>
    <div id="plantSelector">
        <div class="plantCard" data-plant="sunflower" data-cost="50"><div class="plantIcon">🌻</div><div class="plantCost">50</div><div class="cooldownOverlay"></div></div>
        <div class="plantCard" data-plant="peashooter" data-cost="100"><div class="plantIcon">🌱</div><div class="plantCost">100</div><div class="cooldownOverlay"></div></div>
        <div class="plantCard" data-plant="wallnut" data-cost="50"><div class="plantIcon">🥜</div><div class="plantCost">50</div><div class="cooldownOverlay"></div></div>
        <div class="plantCard" data-plant="repeater" data-cost="200"><div class="plantIcon">🌿</div><div class="plantCost">200</div><div class="cooldownOverlay"></div></div>
        <div class="plantCard" data-plant="cherrybomb" data-cost="150"><div class="plantIcon">🍒</div><div class="plantCost">150</div><div class="cooldownOverlay"></div></div>
        <div class="plantCard" data-plant="chomper" data-cost="150"><div class="plantIcon">🐊</div><div class="plantCost">150</div><div class="cooldownOverlay"></div></div>
    </div>
    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="controls">
        <button id="startBtn">开始游戏</button>
        <button id="pauseBtn">暂停</button>
        <button class="speedBtn active" data-speed="1">1x</button>
        <button class="speedBtn" data-speed="2">2x</button>
        <button class="speedBtn" data-speed="3">3x</button>
    </div>
    <div id="waveInfo">
        <h3>下一波预览</h3>
        <p id="nextWaveZombies"></p>
        <p id="nextWaveBoss"></p>
    </div>
    <div id="gameOver">
        <h2>游戏结束!</h2>
        <div id="finalScore"></div>
        <button id="restartBtn">重新开始</button>
    </div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const COLS=9,ROWS=5,CELL_WIDTH=100,CELL_HEIGHT=100,LAWN_X=100,LAWN_Y=50;
const NORMAL_ZOMBIE_HEALTH=100,SUN_VALUE=25,SUN_DROP_INTERVAL=30,SUN_AUTO_COLLECT_DELAY=1;
const ZOMBIE_SPEED_MULTIPLIER=0.5,CHERRY_BOMB_DAMAGE=NORMAL_ZOMBIE_HEALTH*2;
const CHOMPER_MAX_EAT_HEALTH=NORMAL_ZOMBIE_HEALTH*2,CHOMPER_CHEW_TIME=60;
const FLAG_ZOMBIE_HEALTH=NORMAL_ZOMBIE_HEALTH*3;
const PLANT_COOLDOWNS={sunflower:7,peashooter:10,wallnut:7,repeater:15,cherrybomb:20,chomper:7};
let gameState='menu',sun=150,score=0,wave=0,gameTime=0,selectedPlant=null,frameCount=0,gameSpeed=1,lastTime=0,plantCooldowns={};
let waveInProgress=false,waveZombiesSpawned=0,waveStartTime=0,waveDifficulty=1;
let plants=[],zombies=[],projectiles=[],suns=[],effects=[];

// 植物类型定义
const PLANT_TYPES={
    sunflower:{name:'向日葵',cost:50,health:100,emoji:'🌻',color:'#FFD700',produceSun:true,sunInterval:500},
    peashooter:{name:'豌豆射手',cost:100,health:100,emoji:'🌱',color:'#4CAF50',shoot:true,shootInterval:100,damage:20},
    wallnut:{name:'坚果墙',cost:50,health:400,emoji:'🥜',color:'#8D6E63',defense:true},
    repeater:{name:'双发射手',cost:200,health:100,emoji:'🌿',color:'#2E7D32',shoot:true,shootInterval:100,damage:20,double:true},
    cherrybomb:{name:'樱桃炸弹',cost:150,health:1,emoji:'🍒',color:'#D32F2F',explode:true,explodeRadius:150,damage:CHERRY_BOMB_DAMAGE},
    chomper:{name:'大嘴花',cost:150,health:100,emoji:'🐊',color:'#388E3C',chomp:true,range:1.5*CELL_WIDTH,maxEatHealth:CHOMPER_MAX_EAT_HEALTH,chewTime:CHOMPER_CHEW_TIME*60}
};

// 僵尸基础类型
const ZOMBIE_BASE_TYPES={
    normal:{name:'普通',health:NORMAL_ZOMBIE_HEALTH,speed:0.3,damage:10,emoji:'🧟',color:'#795548',score:10,weight:50},
    fast:{name:'快速',health:80,speed:0.6,damage:10,emoji:'🏃',color:'#A1887F',score:15,weight:25},
    cone:{name:'路障',health:200,speed:0.3,damage:10,emoji:'🧟‍♂️',color:'#8D6E63',score:20,weight:15},
    bucket:{name:'铁桶',health:400,speed:0.25,damage:10,emoji:'🪣',color:'#6D4C41',score:30,weight:8},
    football:{name:'橄榄球',health:600,speed:0.5,damage:15,emoji:'🏈',color:'#3E2723',score:50,weight:2}
};

// BOSS类型
const BOSS_TYPES={
    flag:{name:'举旗',health:FLAG_ZOMBIE_HEALTH,speed:0.25,damage:10,emoji:'🚩',color:'#D32F2F',score:100,isBoss:true,summonInterval:5,summonType:'normal'},
    gargantuar:{name:'巨人',health:FLAG_ZOMBIE_HEALTH*2,speed:0.2,damage:20,emoji:'👹',color:'#B71C1C',score:200,isBoss:true,summonInterval:8,summonType:'cone'},
    zomboss:{name:'僵王',health:FLAG_ZOMBIE_HEALTH*3,speed:0.15,damage:30,emoji:'👿',color:'#7B1FA2',score:500,isBoss:true,summonInterval:6,summonType:'fast'}
};

// 波次生成器类
class WaveGenerator{
    constructor(){
        this.currentWave=0;
        this.difficultyMultiplier=1;
    }
    
    // 生成波次配置
    generateWave(waveNum){
        this.currentWave=waveNum;
        // 难度每波增加5%
        this.difficultyMultiplier=1+(waveNum-1)*0.05;
        
        // 判断是否是BOSS波（每3波）
        const isBossWave=waveNum%3===0;
        const bossCount=isBossWave?Math.min(Math.floor(waveNum/3),3):0;
        
        // 基础僵尸数量随波次增加
        let baseZombieCount=3+Math.floor(waveNum*0.8);
        if(waveNum===1)baseZombieCount=4; // 第一波特殊处理
        
        // 生成僵尸配置
        const zombies=[];
        
        if(isBossWave){
            // BOSS波：先生成BOSS，再生成普通僵尸
            const bossConfigs=this.generateBosses(bossCount);
            zombies.push(...bossConfigs);
            
            // BOSS波额外僵尸
            baseZombieCount+=bossCount*2;
        }
        
        // 生成普通僵尸
        const normalZombies=this.generateNormalZombies(baseZombieCount);
        zombies.push(...normalZombies);
        
        return{
            waveNum:waveNum,
            difficulty:this.difficultyMultiplier,
            isBossWave:isBossWave,
            bossCount:bossCount,
            zombies:zombies,
            totalCount:zombies.reduce((s,z)=>s+z.count,0)
        };
    }
    
    // 生成BOSS
    generateBosses(count){
        const bosses=[];
        const bossTypes=Object.keys(BOSS_TYPES);
        
        for(let i=0;i<count;i++){
            // 根据波次选择BOSS类型
            let bossType='flag';
            if(this.currentWave>=9&&Math.random()<0.3)bossType='zomboss';
            else if(this.currentWave>=6&&Math.random()<0.5)bossType='gargantuar';
            
            const row=Math.floor(Math.random()*ROWS);
            bosses.push({
                type:bossType,
                count:1,
                interval:0,
                row:row,
                isBoss:true
            });
        }
        return bosses;
    }
    
    // 生成普通僵尸
    generateNormalZombies(count){
        const zombies=[];
        const typePool=[];
        
        // 根据波次和难度调整僵尸类型权重
        for(const[type,config]of Object.entries(ZOMBIE_BASE_TYPES)){
            let weight=config.weight;
            
            // 后期波次增加高级僵尸概率
            if(this.currentWave>=5){
                if(type==='cone')weight+=5;
                if(type==='bucket')weight+=3;
            }
            if(this.currentWave>=10){
                if(type==='bucket')weight+=5;
                if(type==='football')weight+=2;
            }
            if(this.currentWave>=15){
                if(type==='football')weight+=3;
            }
            
            for(let i=0;i<weight;i++)typePool.push(type);
        }
        
        // 随机分配僵尸到各波次组
        const groups=Math.min(3+Math.floor(this.currentWave/5),6);
        const perGroup=Math.floor(count/groups);
        
        for(let g=0;g<groups;g++){
            const groupCount=g===groups-1?count-g*perGroup:perGroup;
            if(groupCount<=0)continue;
            
            const type=typePool[Math.floor(Math.random()*typePool.length)];
            zombies.push({
                type:type,
                count:groupCount,
                interval:0
            });
        }
        
        return zombies;
    }
    
    // 获取下一波预览信息
    getNextWaveInfo(waveNum){
        const wave=this.generateWave(waveNum);
        let info=`僵尸总数: ${wave.totalCount}`;
        if(wave.isBossWave)info+=` (含${wave.bossCount}个BOSS)`;
        return{info:info,difficulty:wave.difficulty.toFixed(1)};
    }
}

const waveGenerator=new WaveGenerator();
let currentWaveConfig=null;

// 植物类
class Plant{constructor(col,row,type){this.col=col;this.row=row;this.type=type;this.config=PLANT_TYPES[type];this.health=this.config.health;this.maxHealth=this.config.health;this.x=LAWN_X+col*CELL_WIDTH+CELL_WIDTH/2;this.y=LAWN_Y+row*CELL_HEIGHT+CELL_HEIGHT/2;this.shootTimer=0;this.sunTimer=0;this.scale=0;this.targetScale=1;this.chewTimer=0;this.digesting=false;}
    update(){if(this.scale<this.targetScale)this.scale+=0.1;if(this.config.produceSun){this.sunTimer++;if(this.sunTimer>=this.config.sunInterval){this.sunTimer=0;suns.push(new Sun(this.x,this.y-30,false));}}if(this.config.shoot){this.shootTimer++;if(this.shootTimer>=this.config.shootInterval){if(zombies.some(z=>z.row===this.row&&z.x>this.x)){this.shootTimer=0;projectiles.push(new Projectile(this.x+20,this.y,this.row,this.config.damage));if(this.config.double)setTimeout(()=>projectiles.push(new Projectile(this.x+20,this.y,this.row,this.config.damage)),200);}}}if(this.config.chomp&&!this.digesting){for(let i=zombies.length-1;i>=0;i--){const z=zombies[i];if(z.row===this.row&&Math.abs(z.x-this.x)<this.config.range&&z.health<=this.config.maxEatHealth){zombies.splice(i,1);this.digesting=true;this.chewTimer=this.config.chewTime;score+=z.config.score;updateUI();break;}}}if(this.digesting){this.chewTimer--;if(this.chewTimer<=0)this.digesting=false;}if(this.config.explode&&this.health<=0)this.explode();}
    explode(){effects.push(new Explosion(this.x,this.y,this.config.explodeRadius));zombies.forEach(z=>{if(Math.hypot(z.x-this.x,z.y-this.y)<this.config.explodeRadius)z.health-=this.config.damage;});}
    draw(){ctx.save();ctx.translate(this.x,this.y);ctx.scale(this.scale,this.scale);ctx.font='40px Arial';ctx.textAlign='center';ctx.textBaseline='middle';if(this.digesting&&Math.floor(frameCount/10)%2===0)ctx.translate(0,-5);ctx.fillText(this.config.emoji,0,0);if(this.health<this.maxHealth){ctx.fillStyle='#333';ctx.fillRect(-20,25,40,6);ctx.fillStyle='#4CAF50';ctx.fillRect(-20,25,40*(this.health/this.maxHealth),6);}if(this.digesting){ctx.fillStyle='#333';ctx.fillRect(-20,35,40,4);ctx.fillStyle='#FF9800';ctx.fillRect(-20,35,40*(1-this.chewTimer/this.config.chewTime),4);}ctx.restore();}
    takeDamage(d){this.health-=d;if(this.config.explode)this.explode();}
}

// 僵尸类 - 支持动态属性
class Zombie{constructor(row,type='normal',difficulty=1){this.row=row;this.type=type;this.isBoss=BOSS_TYPES[type]?true:false;this.baseConfig=this.isBoss?BOSS_TYPES[type]:ZOMBIE_BASE_TYPES[type];this.difficulty=difficulty;this.health=Math.floor(this.baseConfig.health*difficulty);this.maxHealth=this.health;this.speed=this.baseConfig.speed*ZOMBIE_SPEED_MULTIPLIER;this.damage=this.baseConfig.damage;this.emoji=this.baseConfig.emoji;this.color=this.baseConfig.color;this.score=this.baseConfig.score;this.x=canvas.width+50+Math.random()*100;this.y=LAWN_Y+row*CELL_HEIGHT+CELL_HEIGHT/2;this.eating=false;this.eatTimer=0;this.animOffset=Math.random()*Math.PI*2;this.summonTimer=0;this.config=this.baseConfig;}
    update(){if(this.config.isBoss){this.summonTimer++;if(this.summonTimer>=this.config.summonInterval*60){this.summonTimer=0;const summonRow=Math.floor(Math.random()*ROWS);const summonType=this.config.summonType;zombies.push(new Zombie(summonRow,summonType,waveDifficulty));}}let blocked=false;for(let p of plants){if(p.row===this.row&&Math.abs(p.x-this.x)<40){blocked=true;this.eating=true;this.eatTimer++;if(this.eatTimer>=30){this.eatTimer=0;p.takeDamage(this.damage);if(p.health<=0){plants=plants.filter(x=>x!==p);this.eating=false;}}break;}}if(!blocked){this.eating=false;this.x-=this.speed*gameSpeed;}if(this.x<LAWN_X-50)gameOver();}
    draw(){ctx.save();ctx.translate(this.x,this.y+Math.sin(frameCount*0.1+this.animOffset)*3);ctx.font=this.isBoss?'55px Arial':'45px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.emoji,0,0);ctx.fillStyle='#333';ctx.fillRect(-25,-40,50,6);const hp=this.health/this.maxHealth;ctx.fillStyle=hp>0.5?'#4CAF50':hp>0.25?'#FF9800':'#F44336';ctx.fillRect(-25,-40,50*hp,6);if(this.isBoss){ctx.fillStyle='#FFD700';ctx.font='12px Arial';ctx.fillText('BOSS',0,-50);}ctx.restore();}
    takeDamage(d){this.health-=d;}
}

class Projectile{constructor(x,y,row,damage){this.x=x;this.y=y;this.row=row;this.damage=damage;this.speed=5*gameSpeed;}
    update(){this.x+=this.speed;for(let z of zombies){if(z.row===this.row&&Math.abs(z.x-this.x)<30&&Math.abs(z.y-this.y)<30){z.takeDamage(this.damage);return false;}}return this.x<=canvas.width;}
    draw(){ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.arc(this.x,this.y,8,0,Math.PI*2);ctx.fill();}
}

class Sun{constructor(x,y,falling=true){this.x=x;this.y=y;this.falling=falling;this.speed=falling?2:0;this.targetY=falling?y+100+Math.random()*100:y;this.size=30;this.spawnTime=gameTime;this.autoCollect=false;}
    update(){if(this.falling&&this.y<this.targetY)this.y+=this.speed*gameSpeed;if(!this.autoCollect&&gameTime-this.spawnTime>=SUN_AUTO_COLLECT_DELAY){this.autoCollect=true;sun+=SUN_VALUE;updateUI();return false;}return true;}
    draw(){ctx.save();ctx.translate(this.x,this.y);ctx.rotate(frameCount*0.02);ctx.font='30px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☀️',0,0);ctx.restore();}
    checkClick(mx,my){if(Math.hypot(mx-this.x,my-this.y)<this.size){sun+=SUN_VALUE;updateUI();return true;}return false;}
}

class Explosion{constructor(x,y,r){this.x=x;this.y=y;this.radius=r;this.life=30;this.maxLife=30;}
    update(){this.life--;return this.life>0;}
    draw(){const a=this.life/this.maxLife,r=this.radius*(1-a*0.5);ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#FF5722';ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFEB3B';ctx.beginPath();ctx.arc(this.x,this.y,r*0.6,0,Math.PI*2);ctx.fill();ctx.restore();}
}

function drawLawn(){ctx.fillStyle='#7CB342';ctx.fillRect(LAWN_X,LAWN_Y,COLS*CELL_WIDTH,ROWS*CELL_HEIGHT);for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ctx.fillStyle=(r+c)%2===0?'#8BC34A':'#9CCC65';ctx.fillRect(LAWN_X+c*CELL_WIDTH,LAWN_Y+r*CELL_HEIGHT,CELL_WIDTH,CELL_HEIGHT);ctx.strokeStyle='#689F38';ctx.lineWidth=1;ctx.strokeRect(LAWN_X+c*CELL_WIDTH,LAWN_Y+r*CELL_HEIGHT,CELL_WIDTH,CELL_HEIGHT);}ctx.fillStyle='#5D4037';ctx.fillRect(0,LAWN_Y,LAWN_X,ROWS*CELL_HEIGHT);}

// 波次管理 - 使用生成器
function updateWave(){
    // 检查当前波次是否结束（所有僵尸被消灭且已生成完毕）
    if(waveInProgress&&zombies.length===0&&waveZombiesSpawned>0&&currentWaveConfig&&waveZombiesSpawned>=currentWaveConfig.totalCount){
        waveInProgress=false;
        wave++;
        waveStartTime=gameTime;
        updateUI();
        return;
    }
    
    if(!waveInProgress){
        // 开局保护期
        if(wave===0){
            if(gameTime-waveStartTime>=30){
                wave=1;
                startWave();
            }
            return;
        }
        
        // 开始新波次
        if(wave>0){
            startWave();
        }
    }
}

function startWave(){
    if(wave<1)return;
    waveInProgress=true;
    waveZombiesSpawned=0;
    currentWaveConfig=waveGenerator.generateWave(wave);
    waveDifficulty=currentWaveConfig.difficulty;
    spawnWaveZombies(currentWaveConfig);
    updateUI();
    updateWavePreview();
}

function spawnWaveZombies(cfg){
    if(!cfg||!cfg.zombies)return;
    let delay=0;
    cfg.zombies.forEach(g=>{
        for(let i=0;i<g.count;i++){
            setTimeout(()=>{
                if(gameState==='playing'){
                    const row=g.row!==undefined?g.row:Math.floor(Math.random()*ROWS);
                    zombies.push(new Zombie(row,g.type,waveDifficulty));
                    waveZombiesSpawned++;
                }
            },delay*1000);
            delay+=0.5+Math.random();
        }
    });
}

function updateWavePreview(){
    const nextInfo=waveGenerator.getNextWaveInfo(wave+1);
    document.getElementById('nextWaveZombies').textContent=nextInfo.info;
    document.getElementById('nextWaveBoss').textContent=`难度系数: ${nextInfo.difficulty}x`;
}

function spawnSun(){suns.push(new Sun(LAWN_X+Math.random()*(COLS*CELL_WIDTH),-30,true));}

function updateUI(){
    document.getElementById('sunCount').textContent=`☀️ 阳光: ${sun}`;
    document.getElementById('score').textContent=`🏆 分数: ${score}`;
    document.getElementById('wave').textContent=`🌊 波次: ${wave}`;
    document.getElementById('difficulty').textContent=`💀 难度: ${waveDifficulty.toFixed(1)}x`;
    document.getElementById('gameTime').textContent=`⏱️ 时间: ${Math.floor(gameTime)}s`;
    document.getElementById('speedControl').textContent=`⚡ 倍速: ${gameSpeed}x`;
    document.querySelectorAll('.plantCard').forEach(c=>{
        const t=c.dataset.plant,cost=parseInt(c.dataset.cost),cooling=plantCooldowns[t]>0;
        if(sun<cost||cooling)c.classList.add('disabled');else c.classList.remove('disabled');
        const cd=PLANT_COOLDOWNS[t];c.querySelector('.cooldownOverlay').style.height=plantCooldowns[t]>0?(plantCooldowns[t]/(cd*60)*100)+'%':'0%';
    });
}

function gameOver(){
    gameState='gameover';
    document.getElementById('finalScore').innerHTML=`最终分数: ${score}<br>坚持波次: ${wave}`;
    document.getElementById('gameOver').style.display='block';
    document.getElementById('waveInfo').style.display='none';
}

function resetGame(){
    gameState='playing';
    sun=150;score=0;wave=0;gameTime=0;frameCount=0;
    waveInProgress=false;waveZombiesSpawned=0;waveStartTime=0;waveDifficulty=1;
    plantCooldowns={};plants=[];zombies=[];projectiles=[];suns=[];effects=[];
    selectedPlant=null;currentWaveConfig=null;
    document.getElementById('gameOver').style.display='none';
    document.getElementById('waveInfo').style.display='block';
    document.querySelectorAll('.plantCard').forEach(c=>c.classList.remove('selected'));
    updateUI();
    updateWavePreview();
}

function gameLoop(ct){
    const dt=(ct-lastTime)/1000;lastTime=ct;
    if(gameState==='playing'){
        gameTime+=dt*gameSpeed;frameCount++;
        if(frameCount%(60*SUN_DROP_INTERVAL)===0)spawnSun();
        updateWave();
        plants.forEach(p=>p.update());
        
        // 更新僵尸并移除死亡的
        zombies.forEach(z=>z.update());
        zombies=zombies.filter(z=>{
            if(z.health<=0){
                score+=z.score;
                updateUI();
                return false;
            }
            return true;
        });
        
        projectiles=projectiles.filter(p=>p.update());
        suns=suns.filter(s=>s.update());
        effects=effects.filter(e=>e.update());
        Object.keys(plantCooldowns).forEach(k=>{if(plantCooldowns[k]>0)plantCooldowns[k]-=gameSpeed;});
        updateUI();
    }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawLawn();
    plants.forEach(p=>p.draw());
    zombies.forEach(z=>z.draw());
    projectiles.forEach(p=>p.draw());
    suns.forEach(s=>s.draw());
    effects.forEach(e=>e.draw());
    requestAnimationFrame(gameLoop);
}

document.querySelectorAll('.plantCard').forEach(c=>c.addEventListener('click',()=>{if(c.classList.contains('disabled'))return;document.querySelectorAll('.plantCard').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');selectedPlant=c.dataset.plant;}));
canvas.addEventListener('click',e=>{if(gameState!=='playing')return;const rect=canvas.getBoundingClientRect(),x=e.clientX-rect.left,y=e.clientY-rect.top;for(let i=suns.length-1;i>=0;i--)if(suns[i].checkClick(x,y)){suns.splice(i,1);return;}if(selectedPlant){const c=Math.floor((x-LAWN_X)/CELL_WIDTH),r=Math.floor((y-LAWN_Y)/CELL_HEIGHT);if(c>=0&&c<COLS&&r>=0&&r<ROWS&&!plants.find(p=>p.col===c&&p.row===r)){const cost=PLANT_TYPES[selectedPlant].cost;if(sun>=cost){sun-=cost;plants.push(new Plant(c,r,selectedPlant));plantCooldowns[selectedPlant]=PLANT_COOLDOWNS[selectedPlant]*60;updateUI();}}}});
document.getElementById('startBtn').addEventListener('click',()=>{if(gameState==='menu'||gameState==='gameover')resetGame();});
document.getElementById('pauseBtn').addEventListener('click',()=>{if(gameState==='playing'){gameState='paused';document.getElementById('pauseBtn').textContent='继续';}else if(gameState==='paused'){gameState='playing';document.getElementById('pauseBtn').textContent='暂停';}});
document.querySelectorAll('.speedBtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.speedBtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');gameSpeed=parseInt(b.dataset.speed);updateUI();}));
document.getElementById('restartBtn').addEventListener('click',resetGame);
updateUI();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
